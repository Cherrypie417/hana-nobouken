<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>My Dog Game with Sound Wave</title>
    <style>
        body { text-align: center; background: #111; color: white; font-family: sans-serif; overflow: hidden; margin: 0; padding: 0; }
        h1 { position: relative; z-index: 10; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); margin-top: 10px; }

        /* ★背景画像を画面全体に固定するCSS */
        .game-background {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -1; pointer-events: none;
            background-position: center; background-size: cover; background-repeat: no-repeat;
            opacity: 0.2; /* ★背景画像をうっすら暗めにしてゲームを見やすくする（0.0〜1.0で調整可） */
        }

        canvas { 
            position: relative; z-index: 5; 
            background: rgba(17, 17, 17, 0.6); /* ★ゲーム画面を透明にして、奥の波形や背景が見えるようにする */
            border: 3px solid #fff; display: block; margin: 10px auto; max-width: 90vw; max-height: 80vh; 
            box-shadow: 0px 0px 30px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>

    <div id="bgArea" class="game-background"></div>

    <h1>画面をタップしてスタート！</h1>
    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <script>
        // ----------------------------------------------------
        // 🖼️ 【背景画像の設定】
        // アップロードした背景画像のファイル名をここに入れます
        // ----------------------------------------------------
        let bgImageSrc = 'tonkatsu.png'; 
        document.getElementById('bgArea').style.backgroundImage = `url(${bgImageSrc})`;

        // ----------------------------------------------------
        // 🎮 【ゲームとサウンド波形のプログラム】
        // ----------------------------------------------------
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let birdY = 300, velocity = 0, score = 0, gameOver = false;
        let pipeX = 800, pipeGap = 160, pipeTop = 200;
        let gameStarted = false;

        const bgm = new Audio('bgm.mp3');
        bgm.loop = true;

        const dogImg = new Image();
        dogImg.src = 'dog.png';

        // 🎵 【サウンド解析（波形用）の設定】
        let audioCtx, analyser, source, bufferLength, dataArray;
        let isAudioSetup = false;

        function setupAudio() {
            if (isAudioSetup) return;
            // 音を解析する仕組み（Web Audio API）を立ち上げる
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser();
            source = audioCtx.createMediaElementSource(bgm);
            source.connect(analyser);
            analyser.connect(audioCtx.destination);
            analyser.fftSize = 128; // 波形の細かさ設定
            bufferLength = analyser.frequencyBinCount;
            dataArray = new Uint8Array(bufferLength);
            isAudioSetup = true;
        }

        // 📊 【サウンドの波（ビジュアライザー）を描画する関数】
        function drawSoundWave() {
            if (!isAudioSetup) return;
            analyser.getByteFrequencyData(dataArray); // 現在の音の強さを取得

            // 画面の下側に、左右対称の綺麗なネオンの波を描く
            ctx.lineWidth = 4;
            ctx.strokeStyle = 'rgba(0, 255, 200, 0.6)'; // さわやかなミントグリーンのネオン光
            ctx.beginPath();

            let sliceWidth = 800 / (bufferLength * 2);
            let x = 0;

            // 左から中央へ向かう波
            for (let i = 0; i < bufferLength; i++) {
                let v = dataArray[i] / 128.0;
                let y = 550 - (v * 70); // 音が強いほど上に飛び跳ねる
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
                x += sliceWidth;
            }
            // 中央から右へ向かう波（左右対称にする）
            for (let i = bufferLength - 1; i >= 0; i--) {
                let v = dataArray[i] / 128.0;
                let y = 550 - (v * 70);
                ctx.lineTo(x, y);
                x += sliceWidth;
            }
            ctx.stroke();
        }

        function draw() {
            ctx.clearRect(0, 0, 800, 600);
            
            // ★ゲーム画面の奥にサウンドの波を描画
            if (gameStarted && !gameOver) {
                drawSoundWave();
            }

            if(dogImg.complete) {
                ctx.drawImage(dogImg, 50, birdY - 37.5, 105, 75);
            }
            
            ctx.fillStyle = 'green'; ctx.fillRect(pipeX, 0, 80, pipeTop);
            ctx.fillRect(pipeX, pipeTop + pipeGap, 80, 600);
            
            ctx.fillStyle = 'white'; ctx.font = '30px Arial'; ctx.textBaseline = 'top'; ctx.textAlign = 'left'; 
            ctx.fillText("Score: " + score, 20, 20);
        }

        function loop() {
            if (!gameStarted) { 
                draw(); 
                ctx.fillStyle = 'white'; ctx.font = '40px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText("TAP TO START", 400, 300); 
                return; 
            }
            if (gameOver) { 
                draw(); 
                ctx.fillStyle = 'red'; ctx.font = '40px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText("GAME OVER - Tap to Restart", 400, 300); 
                return; 
            }
            
            velocity += 0.5; birdY += velocity; pipeX -= 5;
            if (pipeX < -80) { pipeX = 800; pipeTop = Math.random() * 300 + 50; score++; }
            
            if (birdY > 600 || birdY < 0 || (pipeX < 155 && pipeX > 20 && (birdY - 25 < pipeTop || birdY + 25 > pipeTop + pipeGap))) { 
                gameOver = true; 
                bgm.pause(); 
            }
            
            draw(); 
            requestAnimationFrame(loop);
        }

        function handleStart() {
            // タップされた瞬間にサウンド機能を初期化する
            setupAudio();
            if (audioCtx && audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            if (!gameStarted) { gameStarted = true; bgm.currentTime = 0; bgm.play(); loop(); } 
            else if (gameOver) { birdY = 300; velocity = 0; pipeX = 800; score = 0; gameOver = false; gameStarted = false; loop(); } 
            else { velocity = -9; } 
        }

        window.addEventListener('mousedown', handleStart);
        window.addEventListener('touchstart', (e) => { e.preventDefault(); handleStart(); });

        loop();
    </script>
</body>
</html>
