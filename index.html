<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>My Dog Game with Dynamic Sound Wave</title>
    <style>
        body { text-align: center; background: #222; color: white; font-family: sans-serif; overflow: hidden; margin: 0; padding: 0; }
        h1 { position: relative; z-index: 10; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); margin-top: 10px; }

        .game-container {
            position: relative;
            width: 800px;
            height: 600px;
            margin: 20px auto;
            max-width: 90vw;
            max-height: 80vh;
            box-shadow: 0px 0px 30px rgba(0,0,0,0.8);
            border: 3px solid #fff;
            overflow: hidden;
        }

        .video-background {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
            opacity: 0.6;
        }
        .video-background iframe { width: 100%; height: 100%; border: none; }

        canvas { 
            position: absolute; top: 0; left: 0;
            z-index: 5;
            background: rgba(17, 17, 17, 0.4);
            width: 100%; height: 100%;
        }
    </style>
</head>
<body>

    <h1>画面をタップしてスタート！</h1>

    <div class="game-container">
        <div class="video-background">
            <div id="ytplayer"></div>
        </div>
        <canvas id="gameCanvas" width="800" height="600"></canvas>
    </div>

    <script>
        // 📺 【YouTube背景動画の設定】
        let videoId = 'qJRp5R2KxvE'; 

        let tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        let firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        let player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('ytplayer', {
                videoId: videoId,
                playerVars: {
                    'autoplay': 1,
                    'controls': 0,
                    'disablekb': 1,
                    'fs': 0,
                    'iv_load_policy': 3,
                    'modestbranding': 1,
                    'rel': 0,
                    'showinfo': 0,
                    'mute': 1,
                    'playlist': videoId
                },
                events: {
                    'onReady': onPlayerReady,
                    'onStateChange': onPlayerStateChange
                }
            });
        }
        function onPlayerReady(event) { event.target.playVideo(); }
        function onPlayerStateChange(event) { if (event.data === YT.PlayerState.ENDED) { player.playVideo(); } }

        // 🎮 【ゲームのプログラム】
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let birdY = 300, velocity = 0, score = 0, gameOver = false;
        let pipeX = 800, pipeGap = 160, pipeTop = 200;
        let gameStarted = false;

        const bgm = new Audio('bgm.mp3');
        bgm.loop = true;

        const dogImg = new Image();
        dogImg.src = 'dog.png';

        // 🎵 【サウンド解析の設定】
        let audioCtx, analyser, source, bufferLength, dataArray;
        let isAudioSetup = false;

        function setupAudio() {
            if (isAudioSetup) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser();
            source = audioCtx.createMediaElementSource(bgm);
            source.connect(analyser);
            analyser.connect(audioCtx.destination);
            analyser.fftSize = 128; // 波の細かさ
            bufferLength = analyser.frequencyBinCount;
            dataArray = new Uint8Array(bufferLength);
            isAudioSetup = true;
        }

        // 📊 【大迫力のサウンド波形を描画する関数】
        function drawSoundWave() {
            if (!isAudioSetup) return;
            analyser.getByteFrequencyData(dataArray);

            ctx.lineWidth = 6; // ★波の線を太くして存在感をアップ
            ctx.strokeStyle = 'rgba(0, 255, 200, 0.7)'; 
            ctx.shadowBlur = 15; // ★ネオンみたいに光らせるエフェクト
            ctx.shadowColor = 'rgba(0, 255, 200, 0.8)';
            ctx.beginPath();

            let sliceWidth = 800 / (bufferLength * 2);
            let x = 0;

            // 左から中央へ
            for (let i = 0; i < bufferLength; i++) {
                let v = dataArray[i] / 128.0;
                // ★高さを画面の真ん中（300px）ベースにして、音の増幅率を大きく（* 180）しました！
                let y = 300 - (v - 1.0) * 180; 
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
                x += sliceWidth;
            }
            // 中央から右へ（左右対称）
            for (let i = bufferLength - 1; i >= 0; i--) {
                let v = dataArray[i] / 128.0;
                let y = 300 - (v - 1.0) * 180;
                ctx.lineTo(x, y);
                x += sliceWidth;
            }
            ctx.stroke();
            
            // 次の描画のためにシャドウ効果をリセット
            ctx.shadowBlur = 0;
        }

        function draw() {
            ctx.clearRect(0, 0, 800, 600);
            
            // ゲーム中、背景動画の手前・土管の奥に激しい波を描画
            if (gameStarted && !gameOver) {
                drawSoundWave();
            }

            if(dogImg.complete) {
                ctx.drawImage(dogImg, 50, birdY - 37.5, 105, 75);
            }
            
            ctx.fillStyle = 'green'; ctx.fillRect(pipeX, 0, 80, pipeTop);
            ctx.fillRect(pipeX, pipeTop + pipeGap, 80, 600);
            
            ctx.fillStyle = 'white'; ctx.font = '30px Arial'; ctx.textBaseline = 'top'; ctx.textAlign = 'left'; 
            ctx.fillText("Score: " + score, 20, 20);
        }

        function loop() {
            if (!gameStarted) { 
                draw(); 
                ctx.fillStyle = 'white'; ctx.font = '40px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText("TAP TO START", 400, 300); 
                return; 
            }
            if (gameOver) { 
                draw(); 
                ctx.fillStyle = 'red'; ctx.font = '40px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText("GAME OVER - Tap to Restart", 400, 300); 
                return; 
            }
            
            velocity += 0.5; birdY += velocity; pipeX -= 5;
            if (pipeX < -80) { pipeX = 800; pipeTop = Math.random() * 300 + 50; score++; }
            
            if (birdY > 600 || birdY < 0 || (pipeX < 155 && pipeX > 20 && (birdY - 25 < pipeTop || birdY + 25 > pipeTop + pipeGap))) { 
                gameOver = true; 
                bgm.pause(); 
            }
            
            draw(); 
            requestAnimationFrame(loop);
        }

        function handleStart() {
            setupAudio();
            if (audioCtx && audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            if (!gameStarted) { gameStarted = true; bgm.currentTime = 0; bgm.play(); loop(); } 
            else if (gameOver) { birdY = 300; velocity = 0; pipeX = 800; score = 0; gameOver = false; gameStarted = false; loop(); } 
            else { velocity = -9; } 
        }

        window.addEventListener('mousedown', handleStart);
        window.addEventListener('touchstart', (e) => { e.preventDefault(); handleStart(); });

        loop();
    </script>
</body>
</html>
